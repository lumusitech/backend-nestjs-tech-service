version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    versioning-strategy: increase
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    assignees:
      - carludev
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
        update-types:
          - minor
          - patch
      types:
        patterns:
          - "@types/*"
        update-types:
          - minor
          - patch
      dev-tools:
        patterns:
          - eslint*
          - typescript*
          - prettier*
          - jest*
          - ts-*
        update-types:
          - minor
          - patch
